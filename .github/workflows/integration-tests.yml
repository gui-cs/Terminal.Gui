name: Build & Run Integration Tests

on:
  push:
    branches: [ v2_release, v2_develop ]
    paths-ignore:
      - '**.md'
  pull_request:
    branches: [ v2_release, v2_develop ]
    paths-ignore:
      - '**.md'
      
jobs:
  # Build job runs once per platform and uploads build artifacts
  # This allows test jobs to skip the build step
  build:
    name: Build Solution
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]

    timeout-minutes: 10
    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.x
        dotnet-quality: 'ga'

    - name: Install dependencies
      run: dotnet restore

    - name: Build IntegrationTests
      run: dotnet build Tests/IntegrationTests --configuration Debug --no-restore

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts-integration-${{ runner.os }}
        path: |
          **/bin/Debug/**
          **/obj/Debug/**
        retention-days: 1  # Keep artifacts for 1 day only to minimize storage costs

  # Integration tests depend on the build job and download its artifacts
  integration_tests:
    name: Integration Tests
    runs-on: ${{ matrix.os }}
    needs: build
    strategy:
      # Turn off fail-fast to let all runners run even if there are errors
      fail-fast: true
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]

    timeout-minutes: 10
    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.x
        dotnet-quality: 'ga'

    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-artifacts-integration-${{ runner.os }}
        path: .

    - name: Restore NuGet packages
      run: dotnet restore

    - name: Set VSTEST_DUMP_PATH
      shell: bash
      run: echo "{VSTEST_DUMP_PATH}={logs/${{ runner.os }}/}" >> $GITHUB_ENV

    - name: Run IntegrationTests
      run: |
       dotnet test Tests/IntegrationTests --no-build --verbosity normal --diag:logs/${{ runner.os }}/logs.txt --blame --blame-crash --blame-hang --blame-hang-timeout 60s --blame-crash-collect-always -- xunit.stopOnFail=true
     
    - name: Upload Test Logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: integration-test-logs-${{ runner.os }}
        path: |
          logs/    
          TestResults/IntegrationTests/

