name: Build & Run Integration Tests
on:
  push:
    branches: [ v2_release, v2_develop ]
    paths-ignore:
      - '**.md'
  pull_request:
    branches: [ v2_release, v2_develop ]
    paths-ignore:
      - '**.md'

jobs:
  build:
    uses: ./.github/workflows/build.yml

  integration_tests:
    name: Integration Tests
    runs-on: ${{ matrix.os }}
    needs: build
    strategy:
      fail-fast: false  # Let all OSes finish even if one fails
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # Fixed: Has 'uses'

      - name: Setup .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.x
          dotnet-quality: ga

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: .

      - name: Restore NuGet packages
        run: dotnet restore  # Fixed: Has 'run'

      - name: Set VSTEST_DUMP_PATH
        shell: bash
        run: echo "VSTEST_DUMP_PATH=logs/${{ runner.os }}/" >> $GITHUB_ENV

      - name: Run IntegrationTests with Coverage
        shell: bash
        run: |
          dotnet test Tests/IntegrationTests \
            --no-build \
            --verbosity minimal \
            --collect:"XPlat Code Coverage" \
            --settings Tests/IntegrationTests/runsettings.xml \
            --diag:logs/${{ runner.os }}/logs.txt \
            --blame \
            --blame-crash \
            --blame-hang \
            --blame-hang-timeout 60s \
            --blame-crash-collect-always

      - name: Upload Integration Tests Coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: Tests/IntegrationTests/TestResults/**/coverage.cobertura.xml
          flags: integrationtests-${{ runner.os }}
          name: codecov-integration-${{ runner.os }}

