name: Build & Run Integration Tests
on:
  push:
    branches: [ v2_release, v2_develop ]
    paths-ignore:
      - '**.md'
  pull_request:
    branches: [ v2_release, v2_develop ]
    paths-ignore:
      - '**.md'

jobs:
  build:
    uses: ./.github/workflows/build.yml

  integration_tests:
    name: Integration Tests
    runs-on: ${{ matrix.os }}
    needs: build
    strategy:
      fail-fast: false   # Let all OSes finish
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.x
          dotnet-quality: ga

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: .

      - name: Restore NuGet packages
        run: dotnet restore

      - name: Set VSTEST_DUMP_PATH
        shell: bash
        run: echo "VSTEST_DUMP_PATH=logs/${{ runner.os }}/" >> $GITHUB_ENV

      - name: Run IntegrationTests with Coverage
        shell: bash
        run: |
          dotnet test Tests/IntegrationTests \
            --no-build \
            --verbosity normal \
            --collect:"XPlat Code Coverage" \
            --settings Tests/IntegrationTests/runsettings.xml \
            --diag:logs/${{ runner.os }}/logs.txt \
            --blame \
            --blame-crash \
            --blame-hang \
            --blame-hang-timeout 60s \
            --blame-crash-collect-always

      - name: Install coverage tools
        if: always()
        shell: bash
        run: |
          dotnet tool install -g dotnet-reportgenerator-globaltool
          dotnet tool install -g dotnet-coverage

      - name: Generate & upload coverage report
        if: always()
        shell: bash
        run: |
          # Find all cobertura files (GUID-named)
          COV_FILES=$(find . -path "*/TestResults/*/*.cobertura.xml" -type f)
          if [ -z "$COV_FILES" ]; then
            echo "No coverage files found"
            exit 0
          fi

          # Merge into one file
          dotnet-coverage merge \
            -o coverage.merged.cobertura.xml \
            -f cobertura \
            $COV_FILES

          # Generate HTML + text
          reportgenerator \
            -reports:coverage.merged.cobertura.xml \
            -targetdir:coveragereport \
            -reporttypes:"Html;TextSummary"

          # Show summary in GitHub UI
          echo "## Integration Tests Coverage (${{ runner.os }})" >> $GITHUB_STEP_SUMMARY
          cat coveragereport/Summary.txt >> $GITHUB_STEP_SUMMARY

      - name: Upload HTML coverage artifact
        if: always()
