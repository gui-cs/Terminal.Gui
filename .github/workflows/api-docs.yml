name: Build and publish v2 API docs

on:
  push:
    branches: [develop]

permissions:
  id-token: write 
  pages: write

jobs:
  deploy:
    name: Build and Deploy v2 API docs to github-pages ${{ github.ref_name }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: windows-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Setup .NET Core
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.x
        dotnet-quality: 'ga'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build Terminal.Gui Release
      run: dotnet build Terminal.Gui/Terminal.Gui.csproj --configuration Release --no-restore

    - name: DocFX Build
      working-directory: docfx
      run: |
        dotnet tool install -g docfx
        $env:DOCFX_SOURCE_BRANCH_NAME="${{ github.ref_name }}"
        docfx metadata
        docfx build
      continue-on-error: false

    - name: Setup Pages
      uses: actions/configure-pages@v6
      
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v5
      with:
        path: docfx/_site
       
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v5
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
