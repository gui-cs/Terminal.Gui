name: Regenerate view GIFs

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  regenerate:
    name: Regenerate docfx view assets
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Setup .NET Core
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.x
        dotnet-quality: 'ga'

    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version: stable

    - name: Restore dependencies
      run: dotnet restore

    - name: Build Terminal.Gui Release
      run: dotnet build Terminal.Gui/Terminal.Gui.csproj --configuration Release --no-restore

    - name: Build EditorRef (for Terminal.Gui.Editor docs)
      run: dotnet build docfx/EditorRef/EditorRef.csproj --configuration Release

    - name: Install tuirec
      shell: pwsh
      run: |
        go install github.com/gui-cs/tuirec/cmd/tuirec@latest
        $env:PATH="$env:PATH;$(go env GOPATH)\bin"
        tuirec --version

    - name: Regenerate views.md and view GIFs
      shell: pwsh
      working-directory: docfx
      run: |
        dotnet tool install -g docfx
        $env:PATH="$env:PATH;$(go env GOPATH)\bin"
        $env:DOCFX_SOURCE_BRANCH_NAME="${{ github.ref_name }}"
        docfx metadata
        ./scripts/generate-views-doc.ps1

    - name: Commit regenerated assets
      shell: pwsh
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add docfx/docs/views.md docfx/images/views

        if (git diff --cached --quiet) {
          Write-Host "No regenerated asset changes to commit."
          exit 0
        }

        git commit -m "Regenerate docfx view GIF assets via CI"
        git push
